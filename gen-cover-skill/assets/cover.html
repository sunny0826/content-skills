<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>封面生成器 · Cover Maker</title>
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
  <style>
    @font-face {
      font-family: 'Noto Serif SC';
      src: url('fonts/NotoSerifSC-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Noto Serif SC';
      src: url('fonts/NotoSerifSC-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Noto Serif SC';
      src: url('fonts/NotoSerifSC-Black.otf') format('opentype');
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'JetBrains Mono';
      src: url('fonts/JetBrainsMono-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'JetBrains Mono';
      src: url('fonts/JetBrainsMono-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'FFMiSans';
      src: url('fonts/MiSans-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'FFXinXiHei';
      src: url('https://cdn.jsdelivr.net/gh/jaywcjlove/free-font@main/docs/fonts/%E9%9C%9E%E9%B9%9C/%E9%BB%91%E4%BD%93/%E9%9C%9E%E9%B9%9C%E6%96%B0%E6%99%B0%E9%BB%91.ttf') format('truetype');
      font-display: swap;
    }

    @font-face {
      font-family: 'FFNanoFlat';
      src: url('https://cdn.jsdelivr.net/gh/jaywcjlove/free-font@main/docs/fonts/%E7%BA%B3%E7%B1%B3%E5%AD%97%E5%BA%93/%E7%BA%B3%E7%B1%B3%E6%89%81%E7%95%8C%E9%BB%91.ttf') format('truetype');
      font-display: swap;
    }

    @font-face {
      font-family: 'FFXiangCube';
      src: url('https://cdn.jsdelivr.net/gh/jaywcjlove/free-font@main/docs/fonts/%E5%85%B6%E4%BB%96%E5%AD%97%E4%BD%93/%E4%B9%A1%E7%AB%8B%E6%96%B9%E9%BB%91%E4%BD%93.ttf') format('truetype');
      font-display: swap;
    }

    @font-face {
      font-family: 'FFJingang';
      src: url('https://cdn.jsdelivr.net/gh/jaywcjlove/free-font@main/docs/fonts/%E5%85%B6%E4%BB%96%E5%AD%97%E4%BD%93/%E5%88%9B%E5%AE%A2%E8%B4%B4%E9%87%91%E5%88%9A%E4%BD%933.0.ttf') format('truetype');
      font-display: swap;
    }

    @font-face {
      font-family: 'FFManHei';
      src: url('https://cdn.jsdelivr.net/gh/jaywcjlove/free-font@main/docs/fonts/%E9%9C%9E%E9%B9%9C/%E9%BB%91%E4%BD%93/%E9%9C%9E%E9%B9%9C%E6%BC%AB%E9%BB%91.ttf') format('truetype');
      font-display: swap;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: #f0f2f5;
      font-family: 'Noto Serif SC', serif;
    }

    /* ── App Header ── */
    .app-header {
      height: 52px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex: none;
    }

    .home-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      color: #9ca3af;
      text-decoration: none;
      flex: none;
      transition: background 0.15s, color 0.15s;
    }

    .home-link:hover {
      background: #f3f4f6;
      color: #374151;
    }

    .header-logo {
      font-size: 14px;
      font-weight: 700;
      color: #111;
      font-family: sans-serif;
      letter-spacing: 0.02em;
      flex: none;
    }

    .header-ratio {
      font-size: 11px;
      font-family: sans-serif;
      color: #9ca3af;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: #f3f4f6;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .header-spacer {
      flex: 1;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      flex: none;
    }

    .btn {
      padding: 7px 14px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-family: sans-serif;
      letter-spacing: 0.02em;
      background: #f9fafb;
      color: #374151;
      transition: all 0.15s;
    }

    .btn:hover {
      background: #f3f4f6;
      border-color: #d1d5db;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }

    .btn-primary:hover {
      background: #1d4ed8;
      border-color: #1d4ed8;
    }

    /* ── Main layout: 3 columns, fills remaining vh ── */
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr 320px;
      height: calc(100vh - 52px);
      overflow: hidden;
    }

    /* ── Side panels ── */
    .panel {
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #e5e7eb transparent;
    }

    .panel::-webkit-scrollbar {
      width: 4px;
    }

    .panel::-webkit-scrollbar-thumb {
      background: #e5e7eb;
      border-radius: 2px;
    }

    .panel-left {
      border-right: 1px solid #e5e7eb;
    }

    .panel-right {
      border-left: 1px solid #e5e7eb;
    }

    .panel-body {
      padding: 14px 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Panel sections ── */
    .psec {
      padding: 14px 0 10px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .psec:last-child {
      border-bottom: none;
    }

    .psec:first-child {
      padding-top: 4px;
    }

    .psec-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
    }

    .psec-title {
      font-size: 10px;
      font-weight: 700;
      color: #9ca3af;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: sans-serif;
    }

    /* ── Fields ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .field label {
      font-size: 10px;
      font-weight: 600;
      color: #6b7280;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: sans-serif;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 7px 9px;
      font-size: 12px;
      font-family: sans-serif;
      color: #111;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      outline: none;
      resize: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      line-height: 1.5;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      background: #fff;
    }

    .field input:disabled,
    .field textarea:disabled,
    .field select:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .field textarea {
      height: 62px;
    }

    .field textarea.tall {
      height: 82px;
    }

    .field select {
      cursor: pointer;
    }

    /* ── Sliders ── */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .slider-row input[type=range] {
      flex: 1;
      accent-color: #2563eb;
      cursor: pointer;
    }

    .slider-val {
      font-size: 10px;
      font-family: sans-serif;
      color: #374151;
      min-width: 42px;
      text-align: right;
    }

    /* ── Field actions group (toggle + color) ── */
    .field-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Visibility toggle ── */
    .vis-toggle {
      font-size: 10px;
      font-family: sans-serif;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      color: #9ca3af;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .vis-toggle.on {
      background: #dcfce7;
      border-color: #86efac;
      color: #16a34a;
    }

    /* ── Color swatch (text color override) ── */
    .color-swatch {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1.5px solid rgba(0, 0, 0, 0.1);
      cursor: pointer;
      padding: 1px;
      background: none;
      flex: none;
      transition: border-color 0.15s;
    }

    .color-swatch:hover {
      border-color: rgba(0, 0, 0, 0.25);
    }

    .color-swatch::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .color-swatch::-webkit-color-swatch {
      border: none;
      border-radius: 2px;
    }

    .color-swatch::-moz-color-swatch {
      border: none;
      border-radius: 2px;
    }

    /* ── Ratio picker ── */
    .ratio-picker {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }

    .ratio-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 4px;
      border: 1.5px solid #e5e7eb;
      border-radius: 6px;
      background: #f9fafb;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .ratio-btn:hover {
      border-color: #93c5fd;
      background: #eff6ff;
    }

    .ratio-btn.active {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .ratio-icon {
      border: 2px solid #9ca3af;
      border-radius: 2px;
      background: #e5e7eb;
      transition: border-color 0.15s, background 0.15s;
    }

    .ratio-btn.active .ratio-icon {
      border-color: #2563eb;
      background: #bfdbfe;
    }

    .ratio-btn span {
      font-size: 9px;
      font-family: sans-serif;
      color: #6b7280;
      letter-spacing: 0.03em;
      line-height: 1;
    }

    .ratio-btn.active span {
      color: #1d4ed8;
      font-weight: 600;
    }

    /* ── Color swatches ── */
    .color-picker {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    /* ── Color mode groups (纯色 / 渐变色) ── */
    .color-modes {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .color-mode-label {
      font-size: 9px;
      font-weight: 700;
      color: #b0b8c4;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: sans-serif;
      margin-bottom: 3px;
    }

    .color-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.15s;
      outline: none;
    }

    .color-btn:hover {
      transform: scale(1.12);
    }

    .color-btn.active {
      outline: 3px solid #111;
      outline-offset: 2px;
    }

    /* ── Custom solid-color button ── */
    .color-btn-custom {
      background: conic-gradient(#ef4444, #f97316, #eab308, #22c55e, #3b82f6, #8b5cf6, #ef4444);
      position: relative;
      overflow: hidden;
    }

    .color-btn-custom::after {
      content: '+';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 900;
      font-family: sans-serif;
      color: #fff;
      background: rgba(0, 0, 0, 0.18);
      pointer-events: none;
    }

    .color-btn-custom input[type="color"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      border: none;
      padding: 0;
    }

    /* Hide "+" once a custom color has been picked */
    .color-btn-custom.has-custom::after {
      display: none;
    }

    /* ── Deco picker ── */
    .deco-picker {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .deco-btn {
      padding: 7px 10px;
      font-size: 12px;
      font-family: sans-serif;
      text-align: left;
      border: 1.5px solid #e5e7eb;
      border-radius: 6px;
      background: #f9fafb;
      cursor: pointer;
      color: #374151;
      transition: all 0.15s;
    }

    .deco-btn:hover {
      border-color: #93c5fd;
      background: #eff6ff;
    }

    .deco-btn.active {
      border-color: #2563eb;
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 600;
    }

    /* ── Center: preview + presets ── */
    .preview-area {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      background: #f5f6f8;
    }

    .cover-zone {
      flex: 1;
      min-height: 0;
      padding: 24px 28px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .cover-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .cover-wrapper .cover {
      flex: none;
      width: 100%;
    }

    /* ── Cover ── */
    .cover {
      --c-bg: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #2563eb 100%);
      --c-glow1: rgba(96, 165, 250, 0.2);
      --c-glow2: rgba(147, 197, 253, 0.15);
      --c-blob: rgba(59, 130, 246, 0.4);
      --c-label: #93c5fd;
      --c-title: #ffffff;
      --c-subtitle: rgba(191, 219, 254, 0.85);
      --c-meta: rgba(191, 219, 254, 0.8);
      --c-meta-line: rgba(191, 219, 254, 0.5);
      --c-accent: #60a5fa;
      --c-font: 'Noto Serif SC', serif;

      position: relative;
      width: 100%;
      background: var(--c-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
      overflow: hidden;
      container-type: inline-size;
      border-radius: 4px;
      aspect-ratio: 1200 / 480;
      font-family: var(--c-font);
    }

    .cover::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60cqi 80cqi at 15% 50%, var(--c-glow1) 0%, transparent 70%),
        radial-gradient(ellipse 40cqi 60cqi at 85% 30%, var(--c-glow2) 0%, transparent 70%);
    }

    /* ── Decoration elements ── */
    .deco-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .deco-grid.classic {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .deco-grid.cyberpunk {
      background-image:
        linear-gradient(rgba(239, 68, 68, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(239, 68, 68, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .deco-grid.sphere {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .deco-scan {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 0%, rgba(239, 68, 68, 0.04) 50%, transparent 100%);
      background-size: 100% 8px;
      animation: scan 8s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0% {
        background-position: 0 -100%;
      }

      100% {
        background-position: 0 100%;
      }
    }

    .deco-hud {
      position: absolute;
      width: 3cqi;
      height: 3cqi;
    }

    .deco-hud::before,
    .deco-hud::after {
      content: '';
      position: absolute;
      background: var(--c-accent);
      opacity: 0.6;
    }

    .deco-hud::before {
      width: 100%;
      height: 1.5px;
      top: 0;
      left: 0;
    }

    .deco-hud::after {
      width: 1.5px;
      height: 100%;
      top: 0;
      left: 0;
    }

    .deco-hud-tl {
      top: 2cqi;
      left: 2cqi;
    }

    .deco-hud-tr {
      top: 2cqi;
      right: 2cqi;
      transform: scaleX(-1);
    }

    .deco-hud-bl {
      bottom: 2cqi;
      left: 2cqi;
      transform: scaleY(-1);
    }

    .deco-hud-br {
      bottom: 2cqi;
      right: 2cqi;
      transform: scale(-1);
    }

    .deco-line {
      position: absolute;
      left: 6cqi;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 33cqi;
      background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.6), transparent);
    }

    .deco-line.cyberpunk {
      width: 2px;
      background: linear-gradient(to bottom, transparent, var(--c-accent), transparent);
    }

    .deco-line.cyberpunk::after {
      content: '';
      position: absolute;
      left: -2px;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--c-accent);
      box-shadow: 0 0 8px var(--c-accent);
    }

    .deco-circle {
      position: absolute;
      right: -5cqi;
      top: -12cqi;
      width: 23cqi;
      height: 23cqi;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.12);
    }

    .deco-circle::after {
      content: '';
      position: absolute;
      inset: 2.8cqi;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.08);
    }

    .deco-circle.cyberpunk {
      right: -4cqi;
      top: -10cqi;
      width: 22cqi;
      height: 22cqi;
      border: 1px solid rgba(239, 68, 68, 0.12);
    }

    .deco-circle.cyberpunk::after {
      inset: 2.5cqi;
      border: 1px solid rgba(239, 68, 68, 0.07);
    }

    .deco-blob {
      position: absolute;
      right: -8cqi;
      bottom: -8cqi;
      width: 30cqi;
      height: 30cqi;
      border-radius: 50%;
      background: radial-gradient(circle, var(--c-blob) 0%, transparent 70%);
    }

    .deco-blob.cyberpunk {
      right: -6cqi;
      bottom: -6cqi;
      width: 28cqi;
      height: 28cqi;
    }

    .deco-dots {
      position: absolute;
      right: 6.5cqi;
      bottom: 10cqi;
      display: grid;
      grid-template-columns: repeat(5, 0.25cqi);
      gap: 0.65cqi;
    }

    .deco-dots span {
      display: block;
      width: 0.25cqi;
      height: 0.25cqi;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
    }

    .deco-dots-cp {
      position: absolute;
      left: 6.5cqi;
      bottom: 2.5cqi;
      display: grid;
      grid-template-columns: repeat(8, 0.22cqi);
      gap: 0.5cqi;
    }

    .deco-dots-cp span {
      display: block;
      width: 0.22cqi;
      height: 0.22cqi;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.25);
    }

    .deco-code {
      position: absolute;
      right: 3cqi;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.3cqi;
      line-height: 1.9;
      color: rgba(239, 68, 68, 0.12);
      text-align: right;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }

    .deco-ai-sphere {
      position: absolute;
      right: 12cqi;
      top: 50%;
      transform: translateY(-50%);
      width: 25cqi;
      height: 25cqi;
      border-radius: 50%;
      border: 1px dashed rgba(255, 255, 255, 0.15);
      box-shadow: inset 0 0 20px var(--c-glow1), 0 0 30px var(--c-glow2);
      animation: spherePulse 10s infinite alternate;
    }

    .deco-ai-sphere::after {
      content: '';
      position: absolute;
      inset: 3cqi;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.1);
      background: radial-gradient(circle, var(--c-blob) 0%, transparent 70%);
    }

    @keyframes spherePulse {
      0% {
        transform: translateY(-50%) scale(1);
      }

      100% {
        transform: translateY(-50%) scale(1.05);
      }
    }

    .deco-circuit {
      position: absolute;
      right: 5cqi;
      bottom: 5cqi;
      display: flex;
      gap: 1.2cqi;
      align-items: flex-end;
    }

    .deco-circuit span {
      display: block;
      width: 0.6cqi;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    .deco-dots-sp {
      position: absolute;
      right: 6.5cqi;
      top: 8cqi;
      display: grid;
      grid-template-columns: repeat(4, 0.3cqi);
      gap: 0.8cqi;
    }

    .deco-dots-sp span {
      display: block;
      width: 0.3cqi;
      height: 0.3cqi;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
    }

    /* ── Minimal (简约风): centered text, ambient glow kept ── */
    .cover.deco-minimal .cover-content {
      text-align: center;
      padding-left: 8cqi;
      padding-right: 8cqi;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Cover content ── */
    .cover-content {
      position: relative;
      z-index: 1;
      padding-left: 10cqi;
      padding-right: 6.5cqi;
      width: 100%;
    }

    .cover .label {
      display: inline-block;
      font-size: 2cqi;
      letter-spacing: 0.2em;
      color: var(--c-label);
      margin-bottom: 1.6cqi;
      font-family: var(--c-font);
      background: rgba(255, 255, 255, 0.1);
      padding: 0.35cqi 1cqi;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .cover h1 {
      font-size: 5cqi;
      font-weight: 900;
      color: var(--c-title);
      line-height: 1.5;
      margin-bottom: 1.6cqi;
      letter-spacing: -0.01em;
      max-width: 70cqi;
    }

    .cover .subtitle {
      font-size: 2cqi;
      color: var(--c-subtitle);
      line-height: 1.6;
      max-width: 70cqi;
      font-weight: 400;
    }

    .cover .meta {
      position: absolute;
      bottom: 1cqi;
      right: 1cqi;
      display: flex;
      align-items: center;
      gap: 1cqi;
      font-size: 1.5cqi;
      color: var(--c-meta);
      letter-spacing: 0.05em;
      z-index: 1;
    }

    .cover .meta::before,
    .cover .meta::after {
      content: '';
      width: 3cqi;
      height: 1px;
    }

    .cover .meta::before {
      background: linear-gradient(to right, transparent, var(--c-meta-line));
    }

    .cover .meta::after {
      background: linear-gradient(to left, transparent, var(--c-meta-line));
    }

    /* Cyberpunk overrides */
    .cover.deco-cyberpunk .label {
      display: inline-flex;
      align-items: center;
      gap: 0.6cqi;
      font-size: 1.7cqi;
      letter-spacing: 0.25em;
      background: rgba(220, 38, 38, 0.12);
      border-radius: 4px;
      border-color: rgba(239, 68, 68, 0.25);
    }

    .cover.deco-cyberpunk .label::before {
      content: '▶';
      font-size: 1.2cqi;
      color: var(--c-accent);
      opacity: 0.8;
    }

    .cover.deco-cyberpunk .meta {
      font-size: 1.4cqi;
      bottom: 2.8cqi;
      right: 3cqi;
    }

    .cover.deco-cyberpunk h1 {
      text-shadow: 0 0 40px rgba(239, 68, 68, 0.15);
    }

    /* Sphere overrides */
    .cover.deco-sphere .label {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 15px var(--c-glow1);
      backdrop-filter: blur(4px);
    }

    .cover.deco-sphere h1 {
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.15), 0 0 40px var(--c-glow1);
    }

    /* ── Presets strip (inside center, below cover) ── */
    .presets-strip {
      flex: none;
      padding: 10px 20px 12px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
    }

    .presets-label {
      font-size: 9px;
      font-weight: 700;
      color: #b0b8c4;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-family: sans-serif;
      margin-bottom: 8px;
    }

    .presets-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: thin;
      scrollbar-color: #e5e7eb transparent;
    }

    .presets-list::-webkit-scrollbar {
      height: 3px;
    }

    .presets-list::-webkit-scrollbar-thumb {
      background: #e5e7eb;
      border-radius: 2px;
    }

    .preset-card {
      flex: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 6px;
      border: 1.5px solid #e5e7eb;
      border-radius: 7px;
      background: #f9fafb;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      width: 116px;
    }

    .preset-card:hover {
      border-color: #93c5fd;
      background: #f0f7ff;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .preset-card.active {
      border-color: #2563eb;
      background: #eff6ff;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    .preset-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 5 / 2;
      border-radius: 3px;
      overflow: hidden;
    }

    .thumb-line {
      position: absolute;
      left: 10%;
      top: 15%;
      width: 2px;
      height: 70%;
      background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.65), transparent);
      border-radius: 1px;
    }

    .thumb-circle {
      position: absolute;
      right: -5%;
      top: -20%;
      width: 42%;
      height: 140%;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .thumb-hud {
      position: absolute;
      width: 18%;
      height: 55%;
      border-top: 1.5px solid currentColor;
      border-left: 1.5px solid currentColor;
      opacity: 0.75;
    }

    .thumb-hud.tl {
      top: 8%;
      left: 8%;
    }

    .thumb-hud.br {
      bottom: 8%;
      right: 8%;
      transform: rotate(180deg);
    }

    .thumb-scan {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(to bottom, transparent, transparent 3px, rgba(255, 255, 255, 0.04) 3px, rgba(255, 255, 255, 0.04) 4px);
    }

    .thumb-sphere {
      position: absolute;
      right: 8%;
      top: 50%;
      transform: translateY(-50%);
      width: 36%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px dashed rgba(255, 255, 255, 0.28);
    }

    .preset-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .preset-name {
      font-size: 11px;
      font-weight: 600;
      color: #111;
      font-family: sans-serif;
      line-height: 1.2;
    }

    .preset-tags {
      font-size: 9px;
      color: #9ca3af;
      font-family: sans-serif;
    }

    .preset-card.active .preset-name {
      color: #1d4ed8;
    }

    .preset-card.active .preset-tags {
      color: #60a5fa;
    }

    /* ── Source image panel ── */
    .source-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }

    .source-thumb-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 4px;
      border: 1.5px solid #e5e7eb;
      border-radius: 6px;
      background: #f9fafb;
      cursor: pointer;
      transition: all 0.15s;
      overflow: hidden;
    }

    .source-thumb-btn:hover {
      border-color: #93c5fd;
      background: #eff6ff;
    }

    .source-thumb-btn.active {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .source-thumb-btn img {
      width: 100%;
      aspect-ratio: 5 / 2;
      object-fit: cover;
      border-radius: 3px;
    }

    .source-thumb-btn span {
      font-size: 9px;
      font-family: sans-serif;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .source-thumb-btn.active span {
      color: #1d4ed8;
    }

    .source-upload-btn {
      border-style: dashed;
      min-height: 52px;
      justify-content: center;
    }

    .source-upload-btn .upload-icon {
      font-size: 18px;
      color: #9ca3af;
      line-height: 1;
    }

    /* ── Cover image element ── */
    .cover-img {
      position: absolute;
      right: 0cqi;
      top: 50%;
      transform: translateY(-50%);
      height: 25cqi;
      width: auto;
      object-fit: contain;
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>

  <script>
    // ── Cover image ────────────────────────────────────────────────────────
    function applyCoverImg() {
      const img = document.getElementById('cover-img');
      const controls = document.getElementById('cover-img-controls');
      const toggleWrap = document.getElementById('cover-img-toggle-wrap');
      if (!coverImgState.path) {
        img.removeAttribute('src');
        img.style.display = 'none';
        controls.style.display = 'none';
        toggleWrap.style.display = 'none';
        return;
      }
      img.src = coverImgState.path;
      img.style.display = coverImgState.visible ? '' : 'none';
      img.style.height = coverImgState.size + 'cqi';
      img.style.right = coverImgState.right + 'cqi';
      controls.style.display = '';
      toggleWrap.style.display = '';
      const btn = document.getElementById('toggle-cover-img');
      btn.textContent = coverImgState.visible ? '显示' : '隐藏';
      btn.classList.toggle('on', coverImgState.visible);
      document.getElementById('sld-cover-img').value = coverImgState.size;
      document.getElementById('val-cover-img').textContent = coverImgState.size + ' cqi';
      document.getElementById('sld-cover-img-right').value = coverImgState.right;

    async function writeTextToClipboard(text) {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.top = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }

    function buildConfigPayload() {
      const changes = {};
      const ratioBtn = getActiveRatioButton();
      const ratio = ratioBtn?.dataset.ratio || DEFAULT_RATIO;
      const ratioLabel = ratioBtn?.dataset.label || '5:2 · 1200×480';
      const background = getCurrentBackgroundConfig();
      const defaultTextColors = getDefaultTextColors(background);
      const ratioDefaults = RATIO_PRESETS[ratio] || RATIO_PRESETS[DEFAULT_RATIO];

      if (ratio !== DEFAULT_RATIO) {
        changes.ratio = { value: ratio, label: ratioLabel };
      }

      if (background.type === 'custom') {
        changes.background = background;
      } else if (background.index !== DEFAULT_SCHEME) {
        changes.background = background;
      }

      const fontId = getCurrentFontChoice();
      if (fontId !== DEFAULT_FONT && FONT_OPTIONS[fontId]) {
        changes.font = {
          id: fontId,
          name: FONT_OPTIONS[fontId].name,
        };
      }

      if (currentDeco !== DEFAULT_DECO) {
        changes.decoration = currentDeco;
      }

      changes.content = {
        label:    document.getElementById('inp-label').value,
        title:    document.getElementById('inp-title').value,
        subtitle: document.getElementById('inp-subtitle').value,
        author:   document.getElementById('inp-author').value,
      };

      const visibility = {};
      Object.entries(visState).forEach(([field, value]) => {
        if (value !== true) visibility[field] = value;
      });
      if (Object.keys(visibility).length) changes.visibility = visibility;

      const typography = {};
      if (readNumber('sld-label') !== ratioDefaults.labelSize) typography.labelSize = readNumber('sld-label');
      if (readNumber('sld-title') !== ratioDefaults.titleSize) typography.titleSize = readNumber('sld-title');
      if (readNumber('sld-subtitle') !== ratioDefaults.subtitleSize) typography.subtitleSize = readNumber('sld-subtitle');
      if (readNumber('sld-width') !== ratioDefaults.width) typography.contentWidth = readNumber('sld-width');
      if (readNumber('sld-title-lh') !== ratioDefaults.titleLH) typography.titleLineHeight = readNumber('sld-title-lh');
      if (readNumber('sld-subtitle-lh') !== ratioDefaults.subtitleLH) typography.subtitleLineHeight = readNumber('sld-subtitle-lh');
      if (readNumber('sld-title-mt') !== ratioDefaults.titleMT) typography.titleMarginTop = readNumber('sld-title-mt');
      if (readNumber('sld-title-mb') !== ratioDefaults.titleMB) typography.titleMarginBottom = readNumber('sld-title-mb');
      if (Object.keys(typography).length) changes.typography = typography;

      const textColors = {};
      const currentColors = {
        label: normalizeHex(document.getElementById('clr-label').value),
        title: normalizeHex(document.getElementById('clr-title').value),
        subtitle: normalizeHex(document.getElementById('clr-subtitle').value),
        meta: normalizeHex(document.getElementById('clr-meta').value),
      };

      Object.entries(currentColors).forEach(([key, value]) => {
        if (value !== defaultTextColors[key]) textColors[key] = value;

      if (Object.keys(textColors).length) changes.textColors = textColors;

      if (coverImgState.path) {
        changes.image = {
          path: coverImgState.path,
          size: coverImgState.size,
          right: coverImgState.right,
          visible: coverImgState.visible,
        };
      }

      return {
        tool: 'cover.html',
        note: '请按以下配置新建一个快捷预设。未列出的字段保持默认。',
        changes,
      };
    }

    // ── Export ─────────────────────────────────────────────────────────────
    async function toDataURL(src) {
      const res = await fetch(src);
      if (!res.ok) throw new Error(`fetch ${src} returned ${res.status}`);
      const blob = await res.blob();
      if (!blob.type.startsWith('image/')) throw new Error(`fetch ${src} returned non-image: ${blob.type}`);
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function captureEl(fn) {
      const el = document.getElementById('cover-main');
      const coverImg = document.getElementById('cover-img');
      const prev = el.style.maxWidth;
      el.style.maxWidth = 'none';
      const rect = el.getBoundingClientRect();
      // fontEmbedCSS:'' prevents html-to-image from fetching @font-face URLs (local + CDN).
      // filter excludes any <img> that isn't a valid data:image/ URL, so html-to-image
      // never tries to load empty/remote img srcs (which would fire error events).
      const options = {
        pixelRatio: 2,
        width: Math.round(rect.width),
        height: Math.round(rect.height),
        skipFonts: true,
        fontEmbedCSS: '',
        filter: (node) => {
          if (node.tagName === 'IMG') {
            const s = node.getAttribute('src');
            return !!(s && s.startsWith('data:image/'));
          }
          return true;
        },
      };

      // Pre-inline cover image as data URL so html-to-image doesn't fetch it.
      let origSrc = null;
      const srcAttr = coverImg.getAttribute('src');
      if (srcAttr && !srcAttr.startsWith('data:')) {
        try {
          origSrc = coverImg.src;
          coverImg.src = await toDataURL(coverImg.src);
        } catch (err) {
          console.warn('cover image inline failed, stripping src:', err.message);
          origSrc = coverImg.src;
          coverImg.removeAttribute('src');
        }
      } else if (srcAttr && srcAttr.startsWith('data:') && !srcAttr.startsWith('data:image/')) {
        origSrc = coverImg.src;
        coverImg.removeAttribute('src');
      }

      const fontsReady = document.fonts?.ready || Promise.resolve();
      return fontsReady
        .then(() => fn(el, options))
        .finally(() => {
          el.style.maxWidth = prev;
          if (origSrc !== null) coverImg.src = origSrc;
        });
    }

    function captureErrMsg(err) {
      if (err instanceof Event) {
        const t = err.target;
        const src = (t?.src || t?.href || t?.currentSrc || '').slice(0, 120);
        return `${err.type} on <${t?.tagName || '?'}>` + (src ? `\n${src}` : '');
      }
      return err?.message || String(err);
    }

    function exportPng() {
      captureEl(htmlToImage.toPng).then(url => {
        const a = document.createElement('a'); a.download = 'cover.png'; a.href = url; a.click();
      }).catch(err => { console.error('exportPng failed:', err); alert('截图失败：' + captureErrMsg(err)); });
    }

    function copyImage() {
      captureEl(htmlToImage.toBlob)
        .then(blob => navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]))
        .then(() => alert('已复制到剪贴板'))
        .catch(err => { console.error('copyImage failed:', err); alert('截图失败：' + captureErrMsg(err)); });
    }

    // ── 从 draft.md 读取封面元数据 ─────────────────────────────────────────
    async function loadDraftMeta() {
      try {
        const res = await fetch('./draft.md');
        if (!res.ok) return null;
        const text = await res.text();
        const get = (key) => {
          const m = text.match(new RegExp('^' + key + '：(.+)$', 'm'));
          return m ? m[1].trim() : null;
        };
        // 解析 ```json ... ``` 块中的 "changes" 对象
        let changes = null;
        const jsonBlock = text.match(/```json\s*([\s\S]*?)```/);
        if (jsonBlock) {
          try {
            const parsed = JSON.parse('{' + jsonBlock[1].trim() + '}');
            changes = parsed.changes || null;
          } catch (_) {}
        }
        return {
          label:      changes?.content?.label    || null,
          title:      changes?.content?.title    || null,
          subtitle:   changes?.content?.subtitle || null,
          author:     changes?.content?.author   || null,
          typography: changes?.typography        || null,
          background: changes?.background        || null,
          font:       changes?.font              || null,
          decoration: changes?.decoration        || null,
          visibility: changes?.visibility        || null,
          textColors: changes?.textColors        || null,
        };
      } catch (_) { return null; }
    }

        if (meta.background) {

            const lbl = document.getElementById('btn-custom-bg');
            lbl.style.background = bg.value;
            lbl.classList.add('has-custom', 'active');
            document.querySelectorAll('.color-btn[data-scheme]').forEach(b => b.classList.remove('active'));
            applyCustomColor(bg.value);
          }
        }

        if (meta.font) {
          document.getElementById('sel-font').value = meta.font.id;
          applyFontChoice(meta.font.id);
        }

        if (meta.decoration) {
          document.querySelectorAll('.deco-btn').forEach(b => b.classList.toggle('active', b.dataset.deco === meta.decoration));
          applyDecoVis(meta.decoration);
          currentDeco = meta.decoration;
          buildDecorations(meta.decoration);
        }

        if (meta.visibility) {
          Object.entries(meta.visibility).forEach(([field, show]) => {
            if (visState[field] !== show) toggleVis(field);
          });
        }

        if (meta.textColors) {
          const colorMap = { label: 'clr-label', title: 'clr-title', subtitle: 'clr-subtitle', meta: 'clr-meta' };
          const elMap = { label: '.label', title: 'h1', subtitle: '.subtitle', meta: '.meta' };
          Object.entries(meta.textColors).forEach(([key, hex]) => {
            if (colorMap[key]) {
              document.getElementById(colorMap[key]).value = hex;
              const el = document.querySelector('#cover-main ' + elMap[key]);
              if (el) el.style.color = hex;
            }
          });
        }

        if (meta.typography) {
          const typoMap = {
            labelSize: 'sld-label', titleSize: 'sld-title', subtitleSize: 'sld-subtitle',
            contentWidth: 'sld-width', titleLineHeight: 'sld-title-lh', subtitleLineHeight: 'sld-subtitle-lh',
            titleMarginTop: 'sld-title-mt', titleMarginBottom: 'sld-title-mb',
          };
          Object.entries(meta.typography).forEach(([key, val]) => {
            const el = document.getElementById(typoMap[key]);
            if (el) el.value = val;
          });
          syncAllSliders();
        }

        syncContent();
      }
    })();
  </script>
</body>

</html>
